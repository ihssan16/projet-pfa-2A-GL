<div class="container-fluid px-4 py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="display-6 fw-bold mb-0">Inscription d'une nouvelle école</h1>
      <p class="text-muted">Remplissez les informations de l'établissement</p>
    </div>
    <button class="btn btn-outline-secondary" routerLink="/admin-metier">
      <i class="bi bi-arrow-left"></i> Retour
    </button>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <form (ngSubmit)="soumettreInscription()">
        <div class="row g-4">
          <!-- Informations de base -->
          <div class="col-md-12">
            <h5 class="fw-bold mb-3">Informations de l'établissement</h5>
          </div>
          <div class="col-md-6">
            <label class="form-label">Nom de l'école *</label>
            <input type="text" class="form-control" [(ngModel)]="nouvelleEcole.nom" name="nom" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Ville *</label>
            <input type="text" class="form-control" [(ngModel)]="nouvelleEcole.ville" name="ville" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Niveaux d'enseignement *</label>
            <select class="form-select" [(ngModel)]="nouvelleEcole.niveaux" name="niveaux" required>
              <option value="">Sélectionnez un niveau</option>
              <option value="Primaire">Primaire</option>
              <option value="Collège">Collège</option>
              <option value="Lycée">Lycée</option>
              <option value="Primaire et Collège">Primaire et Collège</option>
              <option value="Collège et Lycée">Collège et Lycée</option>
              <option value="Primaire, Collège et Lycée">Primaire, Collège et Lycée</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Capacité (nombre d'élèves)</label>
            <input type="number" class="form-control" [(ngModel)]="nouvelleEcole.capacite_eleves" name="capacite">
          </div>

          <!-- Documents -->
          <div class="col-md-12 mt-3">
            <h5 class="fw-bold mb-3">Documents requis</h5>
          </div>
          <div class="col-md-4">
            <label class="form-label">Autorisation d'ouverture</label>
            <input type="file" class="form-control" (change)="onFileSelected($event, 'autorisation')" accept=".pdf,.jpg,.png">
            <small class="text-muted" *ngIf="fichiers.autorisation">Fichier sélectionné</small>
          </div>
          <div class="col-md-4">
            <label class="form-label">Pièce d'identité du responsable</label>
            <input type="file" class="form-control" (change)="onFileSelected($event, 'identite')" accept=".pdf,.jpg,.png">
            <small class="text-muted" *ngIf="fichiers.identite">Fichier sélectionné</small>
          </div>
          <div class="col-md-4">
            <label class="form-label">Justificatif de domicile</label>
            <input type="file" class="form-control" (change)="onFileSelected($event, 'justificatif')" accept=".pdf,.jpg,.png">
            <small class="text-muted" *ngIf="fichiers.justificatif">Fichier sélectionné</small>
          </div>

          <!-- Contact -->
          <div class="col-md-12 mt-3">
            <h5 class="fw-bold mb-3">Contact de l'école</h5>
          </div>
          <div class="col-md-4">
            <label class="form-label">Email de contact *</label>
            <input type="email" class="form-control" [(ngModel)]="nouvelleEcole.email_contact" name="email_contact" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Téléphone</label>
            <input type="tel" class="form-control" [(ngModel)]="nouvelleEcole.telephone" name="telephone">
          </div>
          <div class="col-md-4">
            <label class="form-label">Site web</label>
            <input type="url" class="form-control" [(ngModel)]="nouvelleEcole.site_web" name="site_web" placeholder="https://...">
          </div>

          <!-- Boutons -->
          <div class="col-md-12 mt-4">
            <button type="submit" class="btn btn-primary btn-lg" [disabled]="chargement">
              <i class="bi bi-send" [class.spin]="chargement"></i>
              {{ chargement ? 'Envoi...' : 'Soumettre la demande' }}
            </button>
            <button type="reset" class="btn btn-outline-secondary ms-2" (click)="resetFormulaire()">Réinitialiser</button>
          </div>
        </div>
      </form>

      <div *ngIf="message" class="alert alert-{{ messageType }} mt-4">
        {{ message }}
      </div>
    </div>
  </div>
</div>
