<div class="container-fluid px-4 py-4">
  
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <a routerLink="/parent" class="text-decoration-none text-muted mb-2 d-inline-block" style="cursor: pointer;">
        <i class="bi bi-arrow-left me-1"></i> Retour au tableau de bord
      </a>
      <h1 class="display-6 fw-bold mb-0 text-dark">Emploi du temps</h1>
      <p class="text-muted" *ngIf="!chargement">{{ infosEtudiant.classe }} • {{ infosEtudiant.ecole }}</p>
    </div>
  </div>

  <div *ngIf="chargement" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted">Génération de l'emploi du temps...</p>
  </div>

  <div class="card border-0 shadow-sm" style="border-radius: 12px; overflow: hidden;" *ngIf="!chargement">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-bordered mb-0 align-middle text-center" style="min-width: 1000px; table-layout: fixed;">
          
          <thead class="table-light">
            <tr>
              <th class="py-3 text-secondary border-bottom-0 bg-light" style="width: 12%;">Heures</th>
              <th *ngFor="let jour of jours" class="py-3 text-dark fw-bold border-bottom-0" style="width: 17.6%;">
                {{ jour }}
              </th>
            </tr>
          </thead>
          
          <tbody>
            <ng-container *ngFor="let heure of heures; let i = index">
              
              <tr>
                <td class="fw-bold text-secondary bg-light py-4">{{ heure }}</td>
                
                <td *ngFor="let jour of jours" class="p-2" style="height: 120px; vertical-align: top;">
                  
                  <div *ngIf="getCours(jour, heure) as cours" 
                       class="h-100 w-100 rounded p-3 text-start border-start border-4 shadow-sm d-flex flex-column justify-content-center"
                       [ngClass]="'border-' + cours.color + ' bg-' + cours.color + ' bg-opacity-10'">
                    <div class="fw-bold text-dark mb-2" style="font-size: 0.95rem;">{{ cours.matiere }}</div>
                    <div class="small text-muted mb-1" style="font-size: 0.8rem;">
                      <i class="bi bi-person-workspace me-2"></i>{{ cours.prof }}
                    </div>
                    <div class="small fw-semibold" style="font-size: 0.8rem;" [ngClass]="'text-' + cours.color">
                      <i class="bi bi-geo-alt-fill me-2"></i>{{ cours.salle }}
                    </div>
                  </div>

                  <div *ngIf="!getCours(jour, heure)" 
                       class="h-100 w-100 rounded d-flex align-items-center justify-content-center"
                       style="background-color: #f8f9fa; border: 2px dashed #e9ecef;">
                    <span class="text-muted fw-medium" style="font-size: 0.85rem; opacity: 0.6;">Libre</span>
                  </div>
                </td>
              </tr>

              <tr *ngIf="i === 1">
                <td colspan="6" class="py-2" style="background-color: #f1f5f9; border-top: 2px solid #e2e8f0; border-bottom: 2px solid #e2e8f0;">
                  <div class="d-flex align-items-center justify-content-center text-secondary fw-bold text-uppercase" style="letter-spacing: 3px; font-size: 0.8rem;">
                    <i class="bi bi-cup-hot-fill fs-5 me-3 text-warning"></i>
                    Pause Déjeuner (12:00 - 14:00)
                    <i class="bi bi-cup-hot-fill fs-5 ms-3 text-warning"></i>
                  </div>
                </td>
              </tr>

            </ng-container>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
