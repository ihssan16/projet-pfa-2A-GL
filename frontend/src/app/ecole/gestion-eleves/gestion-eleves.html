<div class="container-fluid px-4 py-4">
  <div class="d-flex align-items-center mb-4">
    <a routerLink="/ecole" class="btn btn-outline-secondary me-3">
      <i class="bi bi-arrow-left"></i> Retour
    </a>
    <h2 class="fw-bold mb-0">Gestion des Élèves</h2>
  </div>

  <div class="row">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white border-0 pt-4 pb-0">
          <h5 class="fw-bold text-primary">
            <i class="bi bi-person-plus-fill me-2"></i>Inscrire un nouvel élève
          </h5>
        </div>
        
        <div class="card-body p-4">
          <div *ngIf="messageSucces" class="alert alert-success">{{ messageSucces }}</div>
          <div *ngIf="messageErreur" class="alert alert-danger">{{ messageErreur }}</div>

          <form (ngSubmit)="creerEleve()" #eleveForm="ngForm">
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label text-muted small">Prénom</label>
                <input type="text" class="form-control" [(ngModel)]="nouvelEleve.first_name" name="first_name" required>
              </div>
              <div class="col-md-6">
                <label class="form-label text-muted small">Nom</label>
                <input type="text" class="form-control" [(ngModel)]="nouvelEleve.last_name" name="last_name" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label text-muted small">Adresse Email (Identifiant)</label>
              <input type="email" class="form-control" [(ngModel)]="nouvelEleve.email" name="email" required>
            </div>

            <div class="mb-4">
              <label class="form-label text-muted small">Mot de passe provisoire</label>
              <input type="password" class="form-control" [(ngModel)]="nouvelEleve.password" name="password" minlength="6" required>
              <small class="text-muted">Minimum 6 caractères.</small>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2" [disabled]="!eleveForm.form.valid || enChargement">
              <span *ngIf="!enChargement">Créer le compte</span>
              <span *ngIf="enChargement">Création en cours...</span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
