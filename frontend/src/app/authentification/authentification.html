<div class="container-fluid bg-light min-vh-100 d-flex align-items-center justify-content-center">
  <div class="row w-100 justify-content-center">
    <div class="col-md-5 col-lg-4">
      
      <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">
          <i class="bi bi-mortarboard-fill me-2"></i>SGE
        </h2>
        <p class="text-muted">Système de Gestion Éducative</p>
      </div>

      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
              <i class="bi bi-shield-lock text-primary fs-3"></i>
            </div>
            <h4 class="fw-bold">
              <span *ngIf="roleActuel === 'admin-systeme'">Connexion Admin Système</span>
  
              <span *ngIf="roleActuel === 'parent'">Espace Parent / Étudiant</span>

              <span *ngIf="roleActuel === 'ecole'">Espace Établissement Scolaire</span>
            </h4>
            <p class="text-muted small">Veuillez saisir vos identifiants pour continuer</p>
          </div>

          <div *ngIf="messageErreur" class="alert alert-danger" role="alert">
            {{ messageErreur }}
          </div>

          <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
            <div class="mb-3">
              <label class="form-label fw-semibold text-muted small">Adresse Email</label>
              <input type="email" class="form-control" [(ngModel)]="email" name="email" required>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold text-muted small">Mot de passe</label>
              <input type="password" class="form-control" [(ngModel)]="mot_de_passe" name="mot_de_passe" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 rounded-3 fw-bold" 
                    [disabled]="!loginForm.form.valid || enChargement">
              <span *ngIf="!enChargement">Se connecter</span>
              <span *ngIf="enChargement">Connexion...</span>
            </button>
          </form>

        </div>
      </div>
      
    </div>
  </div>
</div>
